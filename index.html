<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>土豪哥的旅行漫遊地圖</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ══ TOKENS ══ */
:root{
  --bk:#1a1a1a; --wh:#fffef5; --yw:#FFE94E; --pk:#FF6B9D;
  --bl:#4FC3F7; --gn:#69D84F; --or:#FF9A3C; --pu:#B57BFF; --rd:#FF4B4B;
  --bd:3px solid var(--bk); --bdt:4px solid var(--bk);
  --sh:4px 4px 0 var(--bk); --shl:6px 6px 0 var(--bk);
  --fh:'Fredoka One','Noto Sans TC',sans-serif;
  --fb:'Nunito','Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:var(--fb);background:var(--yw);color:var(--bk);}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(0,0,0,.07) 1.5px,transparent 1.5px);background-size:18px 18px;pointer-events:none;z-index:0;}

/* ══ APP SHELL ══ */
#app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;}

/* ══ HEADER ══ */
header{
  background:var(--pk);border-bottom:var(--bdt);
  padding:8px 16px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;box-shadow:0 4px 0 var(--bk);z-index:200;
}
.h-logo{width:44px;height:44px;background:var(--yw);border:var(--bdt);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--sh);flex-shrink:0;animation:wiggle 3s ease-in-out infinite;}
@keyframes wiggle{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
.h-title{font-family:var(--fh);font-size:clamp(1rem,3vw,1.8rem);color:var(--wh);text-shadow:3px 3px 0 var(--bk);-webkit-text-stroke:1px var(--bk);}
.h-sub{font-size:.65rem;font-weight:800;color:rgba(255,254,245,.75);letter-spacing:.1em;text-transform:uppercase;}
.h-actions{margin-left:auto;display:flex;gap:7px;align-items:center;}
.hbtn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:var(--bdt);border-radius:10px;font-family:var(--fb);font-size:.78rem;font-weight:800;background:var(--yw);color:var(--bk);cursor:pointer;box-shadow:var(--sh);transition:all .12s;white-space:nowrap;}
.hbtn:hover{transform:translate(-2px,-2px);box-shadow:var(--shl);}
.hbtn:active{transform:translate(4px,4px);box-shadow:none;}
.badge{background:var(--rd);color:#fff;border-radius:20px;padding:1px 6px;font-size:.68rem;font-weight:900;border:2px solid var(--bk);}

/* ══ TABS ══ */
.tabs-bar{background:var(--bl);border-bottom:var(--bdt);padding:0 14px;display:flex;gap:5px;align-items:flex-end;box-shadow:0 4px 0 var(--bk);flex-shrink:0;overflow-x:auto;scrollbar-width:none;z-index:100;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab{background:rgba(255,255,255,.3);border:var(--bdt);border-bottom:none;border-radius:12px 12px 0 0;padding:8px 16px;font-family:var(--fh);font-size:.88rem;color:var(--bk);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;position:relative;top:3px;}
.tab:hover{background:rgba(255,255,255,.55);}
.tab.active{background:var(--yw);box-shadow:-3px -3px 0 var(--bk),3px -3px 0 var(--bk);top:0;}
.tab-n{background:var(--bk);color:var(--yw);border-radius:20px;padding:1px 6px;font-size:.7rem;font-weight:900;}
.tab.active .tab-n{background:var(--pk);color:#fff;}

/* ══ MAIN — TRUE FLEX ROW, NO ABSOLUTE ══ */
main{
  display:flex;
  flex:1;
  min-height:0;
  overflow:hidden;
  /* children: map | drag1 | sidebar | drag2 | planner */
}

/* MAP */
#mapWrap{flex:1;min-width:120px;position:relative;}
#map{width:100%;height:100%;}
#map::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:500;box-shadow:inset 0 0 0 3px var(--bk);}

/* DRAG HANDLE (shared style) */
.drag-handle{
  width:8px;flex-shrink:0;background:var(--bk);cursor:col-resize;
  position:relative;z-index:10;transition:background .15s;
  display:flex;align-items:center;justify-content:center;
}
.drag-handle:hover,.drag-handle.active{background:var(--yw);}
.drag-handle::after{content:'⠿';font-size:13px;color:rgba(255,255,255,.5);transform:rotate(90deg);pointer-events:none;}
.drag-handle:hover::after,.drag-handle.active::after{color:var(--bk);}
/* planner drag handle hidden when planner closed */
#dh2{width:0;overflow:hidden;transition:width .3s;}
#dh2.show{width:8px;}

/* SIDEBAR */
#sidebar{
  width:290px;min-width:180px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--wh);border-left:var(--bdt);overflow:hidden;
}
.sb-head{padding:12px 14px 10px;background:var(--gn);border-bottom:var(--bdt);box-shadow:0 4px 0 var(--bk);}
.sb-title{font-family:var(--fh);font-size:1.25rem;display:flex;align-items:center;gap:9px;}
.sb-desc{font-size:.7rem;font-weight:700;color:rgba(0,0,0,.6);margin-top:3px;}
.filter-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.fchip{padding:3px 10px;border:2.5px solid var(--bk);border-radius:20px;font-size:.68rem;font-weight:800;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.5);box-shadow:2px 2px 0 var(--bk);}
.fchip:active{transform:translate(2px,2px);box-shadow:none;}
.fchip.on-sight{background:var(--bl);}
.fchip.on-restaurant{background:var(--or);}
.fchip.on-nature{background:var(--gn);}
.place-list{flex:1;overflow-y:auto;padding:8px 7px;display:flex;flex-direction:column;gap:6px;}
.place-list::-webkit-scrollbar{width:4px;}
.place-list::-webkit-scrollbar-thumb{background:var(--bk);border-radius:2px;}

/* PLACE CARD */
.pcard{border:var(--bdt);border-radius:14px;overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:transform .15s,box-shadow .15s;}
.pcard:hover,.pcard.active{transform:translate(-2px,-2px);box-shadow:var(--shl);}
.pcard-top{display:flex;align-items:center;gap:9px;padding:8px 10px;}
.pcard-ico{width:38px;height:38px;border:2.5px solid var(--bk);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2em;flex-shrink:0;box-shadow:2px 2px 0 var(--bk);}
.pcard-info{flex:1;min-width:0;}
.pcard-name{font-family:var(--fh);font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-tag{display:inline-block;margin-top:2px;padding:1px 7px;border:2px solid var(--bk);border-radius:20px;font-size:.6rem;font-weight:800;}
.pcard-meta{font-size:.6rem;color:#777;font-weight:700;margin-top:2px;}
.pcard-acts{display:flex;gap:5px;flex-shrink:0;}
.btn-add{width:28px;height:28px;border:2.5px solid var(--bk);border-radius:8px;background:var(--yw);display:flex;align-items:center;justify-content:center;font-size:.85em;cursor:pointer;box-shadow:2px 2px 0 var(--bk);transition:all .12s;flex-shrink:0;}
.btn-add:active{transform:translate(2px,2px);box-shadow:none;}
.btn-add.on{background:var(--gn);}
.chev{font-size:1em;transition:transform .2s;flex-shrink:0;}
.chev.open{transform:rotate(180deg);}
.sight     .pcard-top{background:#e0f4ff;} .sight     .pcard-ico{background:var(--bl);} .sight     .pcard-tag{background:var(--bl);}
.restaurant .pcard-top{background:#fff3e0;} .restaurant .pcard-ico{background:var(--or);} .restaurant .pcard-tag{background:var(--or);}
.nature    .pcard-top{background:#e8fce0;} .nature    .pcard-ico{background:var(--gn);} .nature    .pcard-tag{background:var(--gn);}
.pcard-body{display:none;padding:9px 11px;background:var(--wh);border-top:2.5px solid var(--bk);animation:sld .2s ease;}
.pcard-body.open{display:block;}
@keyframes sld{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.pdesc{font-size:.76rem;line-height:1.75;color:#333;margin-bottom:9px;border-left:4px solid var(--yw);padding-left:8px;}
.pbtns{display:flex;gap:6px;flex-wrap:wrap;}
.abtn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border:2.5px solid var(--bk);border-radius:8px;font-family:var(--fb);font-size:.7rem;font-weight:800;text-decoration:none;cursor:pointer;box-shadow:3px 3px 0 var(--bk);transition:all .12s;}
.abtn:active{transform:translate(3px,3px);box-shadow:none;}
.abtn-nav{background:var(--bl);color:var(--bk);}
.abtn-art{background:var(--pk);color:#fff;}
.abtn-tel{background:var(--gn);color:var(--bk);}
.abtn-plan{background:var(--yw);color:var(--bk);}

/* ══ PLANNER PANEL ══
   KEY: width:0 → width:360px, NO position:absolute
   It is a FLEX SIBLING of mapWrap and sidebar
*/
#planner{
  width:0;
  min-width:0;
  flex-shrink:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:var(--wh);
  border-left:0px solid var(--bk);
  transition:width .3s cubic-bezier(.22,1,.36,1),
             border-left-width .3s,
             min-width .3s;
}
#planner.open{
  width:340px;
  min-width:260px;
  border-left-width:4px;
}

/* planner header */
.pl-head{
  background:var(--pu);border-bottom:var(--bdt);
  padding:10px 12px;display:flex;align-items:center;
  gap:7px;flex-shrink:0;
  font-family:var(--fh);font-size:.95rem;
  box-shadow:0 4px 0 var(--bk);
  flex-wrap:wrap;
}
.pl-title{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-acts{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.plbtn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:2.5px solid var(--bk);border-radius:8px;font-family:var(--fb);font-size:.7rem;font-weight:800;cursor:pointer;box-shadow:var(--sh);transition:all .12s;background:var(--wh);color:var(--bk);}
.plbtn:active{transform:translate(4px,4px);box-shadow:none;}
.plbtn-sort{background:var(--bl);}
.plbtn-del{background:var(--rd);color:#fff;}
.plbtn-close{background:var(--bk);color:var(--wh);padding:4px 8px;}
.plbtn-share{background:var(--bl);flex:1;justify-content:center;}
.plbtn-export{background:var(--gn);flex:1;justify-content:center;}

/* itinerary tabs (multiple plans) */
.plan-tabs{
  display:flex;gap:4px;padding:8px 10px 0;
  background:rgba(181,123,255,.15);
  border-bottom:2.5px solid var(--bk);
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
}
.plan-tabs::-webkit-scrollbar{display:none;}
.ptab{
  padding:5px 12px;border:2.5px solid var(--bk);border-radius:8px 8px 0 0;
  font-family:var(--fh);font-size:.75rem;cursor:pointer;
  background:rgba(255,255,255,.5);box-shadow:2px 0 0 var(--bk);
  white-space:nowrap;transition:all .12s;flex-shrink:0;
}
.ptab.active{background:var(--yw);}
.ptab-add{background:var(--gn);border-style:dashed;}

/* summary bar */
.pl-sum{padding:7px 12px;background:rgba(181,123,255,.15);border-bottom:2.5px solid var(--bk);font-size:.7rem;font-weight:800;color:#555;display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0;}

/* day blocks */
.pl-days{flex:1;overflow-y:auto;padding:8px;}
.pl-days::-webkit-scrollbar{width:4px;}
.pl-days::-webkit-scrollbar-thumb{background:var(--bk);border-radius:2px;}

.day-block{margin-bottom:12px;}
.day-lbl{
  display:flex;align-items:center;justify-content:space-between;
  border:var(--bdt);border-radius:10px;padding:6px 10px;
  box-shadow:var(--sh);margin-bottom:5px;gap:6px;
}
.day-lbl-l{display:flex;align-items:center;gap:7px;flex:1;min-width:0;}
.day-edit{font-family:var(--fh);font-size:.88rem;outline:none;border-bottom:2px dashed transparent;cursor:text;min-width:30px;max-width:100px;white-space:nowrap;overflow:hidden;}
.day-edit:focus{border-bottom-color:var(--bk);}
.day-meta{font-size:.6rem;font-weight:700;color:#888;white-space:nowrap;}
.day-lbl-r{display:flex;gap:5px;}
.day-sort{padding:2px 8px;border:2px solid var(--bk);border-radius:6px;font-size:.65rem;font-weight:800;cursor:pointer;background:var(--wh);box-shadow:2px 2px 0 var(--bk);transition:all .12s;}
.day-sort:hover{background:var(--bl);}
.day-sort:active{transform:translate(2px,2px);box-shadow:none;}
.day-rm{width:24px;height:24px;border:2px solid var(--bk);border-radius:6px;background:var(--rd);color:#fff;font-size:.75em;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 var(--bk);transition:all .12s;}
.day-rm:active{transform:translate(2px,2px);box-shadow:none;}

.drop-zone{min-height:50px;border:3px dashed var(--bk);border-radius:10px;padding:5px;display:flex;flex-direction:column;gap:4px;background:rgba(255,233,78,.15);transition:background .2s;}
.drop-zone.over{background:rgba(255,233,78,.6);border-style:solid;}
.dz-hint{text-align:center;font-size:.68rem;font-weight:700;color:#bbb;padding:10px;pointer-events:none;}

.pi{display:flex;align-items:center;gap:6px;background:var(--wh);border:2.5px solid var(--bk);border-radius:9px;padding:6px 8px;cursor:grab;box-shadow:2px 2px 0 var(--bk);transition:opacity .15s;}
.pi.dragging{opacity:.3;cursor:grabbing;}
.pi-drag{font-size:.9em;color:#ccc;letter-spacing:-2px;flex-shrink:0;}
.pi-num{width:18px;height:18px;background:var(--bk);color:var(--wh);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:900;flex-shrink:0;}
.pi-ico{font-size:1.1em;flex-shrink:0;}
.pi-inf{flex:1;min-width:0;}
.pi-name{font-family:var(--fh);font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-dur{font-size:.6rem;font-weight:700;color:#999;}
.pi-nav{font-size:.9em;text-decoration:none;opacity:.4;transition:opacity .15s;flex-shrink:0;}
.pi-nav:hover{opacity:1;}
.pi-rm{background:none;border:none;font-size:.95em;cursor:pointer;color:#ccc;flex-shrink:0;padding:0;}
.pi-rm:hover{color:var(--rd);}
.pi.sight-i     {border-left:5px solid var(--bl);}
.pi.restaurant-i{border-left:5px solid var(--or);}
.pi.nature-i    {border-left:5px solid var(--gn);}

.pl-foot{padding:10px 12px;border-top:var(--bdt);display:flex;gap:7px;flex-shrink:0;background:var(--wh);}

.empty-plan{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:#ccc;font-weight:800;font-size:.82rem;text-align:center;padding:20px;}
.empty-plan .big{font-size:2.8em;}

/* ══ LEAFLET POPUP ══ */
.leaflet-popup-content-wrapper{border:4px solid #1a1a1a!important;border-radius:16px!important;box-shadow:6px 6px 0 #1a1a1a!important;padding:0!important;overflow:hidden;font-family:'Nunito','Noto Sans TC',sans-serif!important;}
.leaflet-popup-tip-container{display:none;}
.leaflet-popup-content{margin:0!important;min-width:200px!important;}
.leaflet-popup-close-button{
  position:absolute!important;right:8px!important;top:8px!important;
  width:22px!important;height:22px!important;
  background:#1a1a1a!important;color:#FFE94E!important;
  border-radius:50%!important;font-size:14px!important;
  display:flex!important;align-items:center!important;justify-content:center!important;
  z-index:10!important;font-weight:900!important;
}
.pp{font-family:'Nunito','Noto Sans TC',sans-serif;}
.pp-head{
  padding:11px 14px 9px;
  display:flex;align-items:center;gap:10px;
  border-bottom:3px solid #1a1a1a;
}
.pp-head > div { flex:1; min-width:0; padding-right:18px; }
.pp-acts{padding:8px 12px 10px;display:flex;gap:7px;flex-wrap:wrap;}
.pp-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border:2.5px solid #1a1a1a;border-radius:9px;
  font-family:'Nunito','Noto Sans TC',sans-serif;
  font-size:.72rem;font-weight:800;
  cursor:pointer;box-shadow:3px 3px 0 #1a1a1a;
  transition:all .12s;background:#FFE94E;color:#1a1a1a;
  text-decoration:none;
}
.pp-btn:active{transform:translate(3px,3px);box-shadow:none;}
.pp-btn-nav{background:#4FC3F7;}
.pp-btn-tel{background:#69D84F;}

/* ══ MODALS ══ */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-ov.hidden{display:none;}
.modal-box{background:var(--wh);border:var(--bdt);border-radius:18px;padding:22px;max-width:420px;width:92%;box-shadow:var(--shl);}
.modal-ttl{font-family:var(--fh);font-size:1.2rem;margin-bottom:8px;}
.modal-desc{font-size:.78rem;color:#777;font-weight:700;margin-bottom:12px;line-height:1.6;}
.share-row{display:flex;gap:7px;margin-bottom:12px;}
.share-row input{flex:1;border:var(--bdt);border-radius:8px;padding:7px 10px;font-family:var(--fb);font-size:.78rem;font-weight:700;background:#f5f5e8;outline:none;}
.modal-close{width:100%;justify-content:center;background:var(--bk);color:#fff;border:var(--bdt);border-radius:9px;padding:8px;font-family:var(--fh);font-size:.95rem;cursor:pointer;box-shadow:var(--sh);margin-top:4px;}

/* ══ RENAME MODAL ══ */
.rename-input{width:100%;border:var(--bdt);border-radius:9px;padding:9px 12px;font-family:var(--fb);font-size:1rem;font-weight:700;background:var(--yw);margin-bottom:12px;outline:none;}
.rename-input:focus{background:#fff9cc;}
.rename-btns{display:flex;gap:8px;}
.rbtn{flex:1;padding:8px;border:var(--bdt);border-radius:9px;font-family:var(--fh);font-size:.95rem;cursor:pointer;box-shadow:var(--sh);}
.rbtn-ok{background:var(--gn);}
.rbtn-cancel{background:var(--bk);color:#fff;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bk);color:#fff;padding:9px 20px;border-radius:30px;font-size:.8rem;font-weight:800;z-index:9999;transition:transform .3s;white-space:nowrap;box-shadow:var(--shl);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ══ SPEED LINES ══ */
.speed-lines{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;opacity:0;}
.speed-lines.show{animation:spd .5s ease forwards;}
@keyframes spd{0%{opacity:.6;}100%{opacity:0;}}
.speed-line{position:absolute;width:120%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,228,78,.8),transparent);transform-origin:left center;}

/* ══ MOBILE PLANNER BACKDROP ══ */
.pl-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:399;backdrop-filter:blur(2px);}
.pl-backdrop.show{display:block;}

/* ══ RWD ══ */
@media(max-width:860px){
  #sidebar{width:240px;min-width:160px;}
  #planner.open{width:280px;min-width:220px;}
}
@media(max-width:600px){
  header{padding:7px 10px;gap:7px;}
  .h-logo{width:36px;height:36px;font-size:17px;}
  .h-title{font-size:.95rem;}
  .h-sub{display:none;}
  .hbtn{padding:5px 9px;font-size:.72rem;}
  .tabs-bar{padding:0 7px;}
  .tab{padding:6px 10px;font-size:.76rem;}

  main{flex-direction:column;}
  #mapWrap{height:42vh;min-height:160px;flex:none;}
  #dh1{width:100%;height:7px;cursor:row-resize;border-left:none;border-top:3px solid var(--bk);}
  #dh1::after{transform:rotate(0deg);}
  #dh2{display:none!important;}
  #sidebar{width:100%;min-width:unset;flex:1;border-left:none;border-top:var(--bdt);}

  /* Mobile: planner = fixed bottom sheet */
  #planner{
    position:fixed!important;
    left:0;right:0;bottom:0;top:auto!important;
    width:100%!important;min-width:unset!important;
    height:0;border-left:none!important;
    border-top:var(--bdt);border-radius:20px 20px 0 0;
    box-shadow:0 -6px 0 var(--bk);
    transition:height .3s cubic-bezier(.22,1,.36,1)!important;
    z-index:400;
  }
  #planner.open{height:82vh;width:100%!important;}
  #planner::before{content:'';display:block;width:36px;height:4px;background:rgba(0,0,0,.18);border-radius:2px;margin:9px auto 0;flex-shrink:0;}
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="h-logo">✈️</div>
    <div>
      <div class="h-title" id="siteTitle">土豪哥的旅行漫遊地圖</div>
      <div class="h-sub" id="siteSub">TuHaoGe's Travel Map</div>
    </div>
    <div class="h-actions">

    </div>
  </header>

  <div class="tabs-bar" id="tabsBar"></div>

  <main>
    <!-- MAP -->
    <div id="mapWrap">
      <div id="map"></div>
    </div>

    <!-- DRAG HANDLE 1 (map ↔ sidebar) -->
    <div class="drag-handle" id="dh1" title="拖曳調整"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sb-head">
        <div class="sb-title"><span id="sflag">🗺️</span><span id="stitle">選擇國家</span></div>
        <div class="sb-desc" id="sdesc">從上方選擇國家</div>
        <div class="filter-row" id="filterRow"></div>
      </div>
      <div class="place-list" id="placeList"></div>
    </aside>


  </main>
</div>

<div class="toast" id="toast"></div>
<div class="speed-lines" id="speedLines">
  <div class="speed-line" style="top:20%;transform:rotate(-8deg)"></div>
  <div class="speed-line" style="top:45%;transform:rotate(-2deg)"></div>
  <div class="speed-line" style="top:70%;transform:rotate(5deg)"></div>
</div>

<script src="js/data.js"></script>
<script src="js/map.js"></script>
<script>
// ═══════════════════════════════════════════════════
// TRAVEL MAP — Main Script (no planner)
// ═══════════════════════════════════════════════════

const TYPE = {
  sight:      {label:'景點', color:'#4FC3F7', emoji:'🏛️'},
  restaurant: {label:'餐廳', color:'#FF9A3C', emoji:'🍽️'},
  nature:     {label:'自然', color:'#69D84F', emoji:'🌿'}
};

let currentCountry = null;
let activeFilters  = new Set(['sight','restaurant','nature']);

// ── Boot ──
document.addEventListener('DOMContentLoaded', async () => {
  // 優先讀 localStorage（與後台同步），再 fallback 到 data.json
  loadFromLocalStorage();
  if (!TRAVEL_DATA || !TRAVEL_DATA.countries?.length) {
    await loadData(); // fetch data.json
  }
  const s = TRAVEL_DATA?.site || {};
  document.title = s.title || '土豪哥的旅行漫遊地圖';
  document.getElementById('siteTitle').textContent = s.title || '土豪哥的旅行漫遊地圖';
  document.getElementById('siteSub').textContent   = s.subtitle || "TuHaoGe's Travel Map";
  initMap();
  buildTabs();
  if (TRAVEL_DATA?.countries?.length) selectCountry(TRAVEL_DATA.countries[0]);
  initDragResize();
});

function loadFromLocalStorage() {
  try {
    const raw = localStorage.getItem('travelMapAdmin');
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed?.countries?.length) {
        TRAVEL_DATA = parsed;
        console.log('✅ 從後台 localStorage 載入資料，共', parsed.countries.length, '個國家');
        return;
      }
    }
  } catch(e) {}
  TRAVEL_DATA = null;
}

// ── Tabs ──
function buildTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = '';
  TRAVEL_DATA.countries.forEach(c => {
    const b = document.createElement('button');
    b.className = 'tab'; b.dataset.id = c.id;
    b.innerHTML = `<span>${c.flag}</span>${c.name}<span class="tab-n">${c.places.length}</span>`;
    b.onclick = () => selectCountry(c);
    bar.appendChild(b);
  });
}

function selectCountry(c) {
  currentCountry = c;
  activeFilters  = new Set(['sight','restaurant','nature']);
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.id === c.id));
  triggerSpeedLines();
  flyToCountry(c.center, c.zoom);
  loadCountryMarkers(c);
  renderSidebar(c);
}

// ── Sidebar ──
function renderSidebar(c) {
  document.getElementById('sflag').textContent  = c.flag;
  document.getElementById('stitle').textContent = c.name;
  document.getElementById('sdesc').textContent  = c.desc;
  const row = document.getElementById('filterRow');
  row.innerHTML = '';
  [...new Set(c.places.map(p=>p.type))].forEach(type => {
    const t = TYPE[type];
    const chip = document.createElement('button');
    chip.className = `fchip on-${type}`;
    chip.dataset.type = type;
    chip.textContent = `${t.emoji} ${t.label}`;
    chip.onclick = () => {
      if (activeFilters.has(type)) {
        if (activeFilters.size === 1) return;
        activeFilters.delete(type);
        chip.classList.remove(`on-${type}`); chip.style.opacity = '.4';
      } else {
        activeFilters.add(type);
        chip.classList.add(`on-${type}`); chip.style.opacity = '1';
      }
      renderCards(c); showMarkersOfTypes(c, activeFilters);
    };
    row.appendChild(chip);
  });
  renderCards(c);
}

function renderCards(c) {
  const list = document.getElementById('placeList');
  list.innerHTML = '';
  c.places.filter(p => activeFilters.has(p.type)).forEach(pl => {
    const t   = TYPE[pl.type];
    const dur = pl.duration ? (pl.duration>=60 ? Math.floor(pl.duration/60)+'h'+(pl.duration%60?pl.duration%60+'m':'') : pl.duration+'min') : '';
    const card = document.createElement('div');
    card.className = `pcard ${pl.type}`;
    card.id = `card-${pl.id}`;
    card.innerHTML = `
      <div class="pcard-top" onclick="toggleCard('${pl.id}',${pl.lat},${pl.lng})">
        <div class="pcard-ico">${pl.icon}</div>
        <div class="pcard-info">
          <div class="pcard-name">${pl.name}</div>
          <span class="pcard-tag">${t.emoji} ${t.label}</span>
          ${pl.tips ? `<div class="pcard-meta">💡 ${pl.tips}${dur?' · ⏱ '+dur:''}</div>` : ''}
        </div>
        <span class="chev" id="chev-${pl.id}">▾</span>
      </div>
      <div class="pcard-body" id="body-${pl.id}">
        <p class="pdesc">${pl.desc}</p>
        <div class="pbtns">
          <a class="abtn abtn-nav" href="https://www.google.com/maps/dir/?api=1&destination=\${pl.lat},\${pl.lng}&travelmode=walking" target="_blank">🧭 導航</a>
          \${pl.phone ? `<a class="abtn abtn-tel" href="tel:\${pl.phone}">📞 \${pl.phone}</a>` : ''}
          \${pl.article ? `<a class="abtn abtn-art" href="\${pl.article}" target="_blank">📝 文章</a>` : ''}
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function toggleCard(id, lat, lng) {
  const body = document.getElementById(`body-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  const card = document.getElementById(`card-${id}`);
  const was  = body.classList.contains('open');
  document.querySelectorAll('.pcard-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.chev').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.pcard').forEach(c => c.classList.remove('active'));
  if (!was) {
    body.classList.add('open'); chev.classList.add('open'); card.classList.add('active');
    panToPlace(lat, lng); openMarkerPopup(id);
  }
}

function scrollToCard(id)  { document.getElementById(`card-${id}`)?.scrollIntoView({behavior:'smooth',block:'nearest'}); }
function focusCard(id) {
  const pl = currentCountry?.places.find(p => p.id === id); if (!pl) return;
  if (!activeFilters.has(pl.type)) {
    activeFilters.add(pl.type);
    document.querySelector(`.fchip[data-type="${pl.type}"]`)?.classList.add(`on-${pl.type}`);
    renderCards(currentCountry); showMarkersOfTypes(currentCountry, activeFilters);
  }
  scrollToCard(id); toggleCard(id, pl.lat, pl.lng);
}

// ── Drag resize (desktop) ──
function initDragResize() {
  if (window.innerWidth <= 600) return;
  const handle  = document.getElementById('dh1');
  const sidebar = document.getElementById('sidebar');
  if (!handle || !sidebar) return;
  let dragging = false, startX = 0, startW = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startW = sidebar.offsetWidth;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newW = Math.min(Math.max(startW + (startX - e.clientX), 180), window.innerWidth * 0.52);
    sidebar.style.width = newW + 'px';
    map?.invalidateSize();
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false; handle.classList.remove('active');
    document.body.style.cursor = ''; document.body.style.userSelect = '';
    map?.invalidateSize();
  });
}

// ── Speed lines ──
function triggerSpeedLines() {
  const el = document.getElementById('speedLines');
  el.classList.remove('show'); void el.offsetWidth;
  el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 600);
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 2600);
}
</script>
</body>
