<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>土豪哥的旅行漫遊地圖</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ══ TOKENS ══ */
:root{
  --bk:#1a1a1a; --wh:#fffef5; --yw:#FFE94E; --pk:#FF6B9D;
  --bl:#4FC3F7; --gn:#69D84F; --or:#FF9A3C; --pu:#B57BFF; --rd:#FF4B4B;
  --bd:3px solid var(--bk); --bdt:4px solid var(--bk);
  --sh:4px 4px 0 var(--bk); --shl:6px 6px 0 var(--bk);
  --fh:'Fredoka One','Noto Sans TC',sans-serif;
  --fb:'Nunito','Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}

/* ══ DESKTOP: flex column fills viewport ══ */
html,body{
  height:100%; overflow:hidden;
  font-family:var(--fb); background:var(--yw); color:var(--bk);
}
body::before{
  content:''; position:fixed; inset:0;
  background-image:radial-gradient(circle,rgba(0,0,0,.07) 1.5px,transparent 1.5px);
  background-size:18px 18px; pointer-events:none; z-index:0;
}
#app{
  display:flex; flex-direction:column;
  height:100vh; overflow:hidden;
  position:relative; z-index:1;
}

/* HEADER */
header{
  flex-shrink:0;
  background:var(--pk); border-bottom:var(--bdt);
  padding:8px 16px; display:flex; align-items:center; gap:12px;
  box-shadow:0 4px 0 var(--bk); z-index:200; overflow:hidden;
}
.h-logo{
  width:44px; height:44px; flex-shrink:0;
  background:var(--yw); border:var(--bdt); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; box-shadow:var(--sh);
  animation:wiggle 3s ease-in-out infinite;
}
@keyframes wiggle{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
.h-title{
  font-family:var(--fh); font-size:clamp(.85rem,2.8vw,1.8rem);
  color:var(--wh); text-shadow:3px 3px 0 var(--bk); -webkit-text-stroke:1px var(--bk);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.h-sub{font-size:.65rem;font-weight:800;color:rgba(255,254,245,.75);letter-spacing:.1em;text-transform:uppercase;}
.h-actions{margin-left:auto;display:flex;gap:7px;align-items:center;flex-shrink:0;}
.hbtn{
  display:inline-flex;align-items:center;gap:5px;padding:6px 12px;
  border:var(--bdt);border-radius:10px;font-family:var(--fb);font-size:.78rem;
  font-weight:800;background:var(--yw);color:var(--bk);cursor:pointer;
  box-shadow:var(--sh);transition:all .12s;white-space:nowrap;
}
.hbtn:active{transform:translate(4px,4px);box-shadow:none;}
.badge{background:var(--rd);color:#fff;border-radius:20px;padding:1px 6px;font-size:.68rem;font-weight:900;border:2px solid var(--bk);}

/* TABS */
.tabs-bar{
  flex-shrink:0;
  background:var(--bl);border-bottom:var(--bdt);
  padding:0 14px;display:flex;gap:5px;align-items:flex-end;
  box-shadow:0 4px 0 var(--bk);overflow-x:auto;scrollbar-width:none;z-index:100;
}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab{
  flex-shrink:0;
  background:rgba(255,255,255,.3);border:var(--bdt);border-bottom:none;
  border-radius:12px 12px 0 0;padding:8px 16px;font-family:var(--fh);
  font-size:.88rem;color:var(--bk);cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all .15s;
  white-space:nowrap;position:relative;top:3px;
}
.tab:hover{background:rgba(255,255,255,.55);}
.tab.active{background:var(--yw);box-shadow:-3px -3px 0 var(--bk),3px -3px 0 var(--bk);top:0;}
.tab-n{background:var(--bk);color:var(--yw);border-radius:20px;padding:1px 6px;font-size:.7rem;font-weight:900;}
.tab.active .tab-n{background:var(--pk);color:#fff;}

/* ══ DESKTOP MAIN ══ */
main{
  flex:1; min-height:0;
  display:flex; overflow:hidden;
}

/* MAP */
#mapWrap{flex:1;min-width:120px;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
#map::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:500;box-shadow:inset 0 0 0 3px var(--bk);}

/* LOCATE BTN */
#locateBtn{
  position:absolute;bottom:32px;right:12px;z-index:600;
  width:44px;height:44px;background:var(--wh);
  border:3px solid var(--bk);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3em;cursor:pointer;box-shadow:var(--sh);transition:all .15s;
}
#locateBtn:active{transform:translate(3px,3px);box-shadow:none;}
#locateBtn.located{background:var(--bl);}

/* DRAG HANDLE desktop */
.drag-handle{
  width:8px;flex-shrink:0;background:var(--bk);cursor:col-resize;
  position:relative;z-index:10;transition:background .15s;
  display:flex;align-items:center;justify-content:center;
}
.drag-handle:hover,.drag-handle.active{background:var(--yw);}
.drag-handle::after{content:'⠿';font-size:13px;color:rgba(255,255,255,.5);transform:rotate(90deg);pointer-events:none;}
.drag-handle:hover::after,.drag-handle.active::after{color:var(--bk);}
#dh2{width:0;overflow:hidden;transition:width .3s;}
#dh2.show{width:8px;}

/* SIDEBAR */
#sidebar{
  width:290px;min-width:180px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--wh);border-left:var(--bdt);overflow:hidden;
}
.sb-head{
  flex-shrink:0;
  padding:12px 14px 10px;background:var(--gn);
  border-bottom:var(--bdt);box-shadow:0 4px 0 var(--bk);
}
.sb-title{font-family:var(--fh);font-size:1.25rem;display:flex;align-items:center;gap:9px;}
.sb-desc{font-size:.7rem;font-weight:700;color:rgba(0,0,0,.6);margin-top:3px;}
.filter-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.city-row{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.city-row:empty{display:none;}
.fchip{
  padding:3px 10px;border:2.5px solid var(--bk);border-radius:20px;
  font-size:.68rem;font-weight:800;cursor:pointer;transition:all .15s;
  background:rgba(255,255,255,.5);box-shadow:2px 2px 0 var(--bk);
}
.fchip:active{transform:translate(2px,2px);box-shadow:none;}
.fchip.on-sight{background:var(--bl);}
.fchip.on-restaurant{background:var(--or);}
.fchip.on-nature{background:var(--gn);}
.fchip.on-hotel{background:var(--pu);}
.ccip{
  padding:3px 10px;border:2.5px solid var(--bk);border-radius:20px;
  font-size:.65rem;font-weight:800;cursor:pointer;
  background:rgba(255,255,255,.5);box-shadow:2px 2px 0 var(--bk);transition:all .15s;
}
.ccip:active{transform:translate(2px,2px);box-shadow:none;}
.ccip.on{background:var(--bk);color:var(--yw);}

/* PLACE LIST desktop */
.place-list{
  flex:1;min-height:0;overflow-y:auto;
  padding:8px 7px;display:flex;flex-direction:column;gap:6px;
  scrollbar-width:thin;scrollbar-color:var(--bk) rgba(0,0,0,.1);
}
.place-list::-webkit-scrollbar{width:7px;}
.place-list::-webkit-scrollbar-track{background:rgba(0,0,0,.07);border-radius:3px;}
.place-list::-webkit-scrollbar-thumb{background:var(--bk);border-radius:3px;min-height:40px;}

/* PLACE CARD */
.pcard{border:var(--bdt);border-radius:14px;overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:transform .15s,box-shadow .15s;}
.pcard:hover,.pcard.active{transform:translate(-2px,-2px);box-shadow:var(--shl);}
.pcard-top{display:flex;align-items:center;gap:9px;padding:8px 10px;}
.pcard-ico{width:38px;height:38px;border:2.5px solid var(--bk);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2em;flex-shrink:0;box-shadow:2px 2px 0 var(--bk);}
.pcard-info{flex:1;min-width:0;}
.pcard-name{font-family:var(--fh);font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard-tag{display:inline-block;margin-top:2px;padding:1px 7px;border:2px solid var(--bk);border-radius:20px;font-size:.6rem;font-weight:800;}
.pcard-meta{font-size:.6rem;color:#777;font-weight:700;margin-top:2px;}
.chev{font-size:1em;transition:transform .2s;flex-shrink:0;}
.chev.open{transform:rotate(180deg);}
.sight      .pcard-top{background:#e0f4ff;} .sight      .pcard-ico,.sight      .pcard-tag{background:var(--bl);}
.restaurant .pcard-top{background:#fff3e0;} .restaurant .pcard-ico,.restaurant .pcard-tag{background:var(--or);}
.nature     .pcard-top{background:#e8fce0;} .nature     .pcard-ico,.nature     .pcard-tag{background:var(--gn);}
.hotel      .pcard-top{background:#f0e8ff;} .hotel      .pcard-ico,.hotel      .pcard-tag{background:var(--pu);}
.pcard-body{display:none;padding:9px 11px;background:var(--wh);border-top:2.5px solid var(--bk);animation:sld .2s ease;}
.pcard-body.open{display:block;}
@keyframes sld{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.pdesc{font-size:.76rem;line-height:1.75;color:#333;margin-bottom:9px;border-left:4px solid var(--yw);padding-left:8px;}
.pbtns{display:flex;gap:6px;flex-wrap:wrap;}
.abtn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border:2.5px solid var(--bk);border-radius:8px;font-family:var(--fb);font-size:.7rem;font-weight:800;text-decoration:none;cursor:pointer;box-shadow:3px 3px 0 var(--bk);transition:all .12s;}
.abtn:active{transform:translate(3px,3px);box-shadow:none;}
.abtn-nav{background:var(--bl);color:var(--bk);}
.abtn-art{background:var(--pk);color:#fff;}
.abtn-tel{background:var(--gn);color:var(--bk);}

/* LEAFLET POPUP */
.leaflet-popup-content-wrapper{border:4px solid #1a1a1a!important;border-radius:16px!important;box-shadow:6px 6px 0 #1a1a1a!important;padding:0!important;overflow:hidden;font-family:var(--fb)!important;}
.leaflet-popup-tip-container{display:none;}
.leaflet-popup-content{margin:0!important;min-width:220px!important;max-width:270px!important;}
.leaflet-popup-close-button{position:absolute!important;right:8px!important;top:8px!important;width:22px!important;height:22px!important;background:#1a1a1a!important;color:#FFE94E!important;border-radius:50%!important;font-size:14px!important;display:flex!important;align-items:center!important;justify-content:center!important;z-index:10!important;font-weight:900!important;}
.pp{font-family:var(--fb);}
.pp-head{padding:11px 14px 9px;display:flex;align-items:center;gap:10px;border-bottom:3px solid #1a1a1a;}
.pp-head>div{flex:1;min-width:0;padding-right:18px;}
.pp-acts{padding:8px 10px 10px;display:flex;gap:6px;flex-wrap:nowrap;}
.pp-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:7px 8px;border:2.5px solid #1a1a1a;border-radius:9px;
  font-family:var(--fb);font-size:.72rem;font-weight:800;
  cursor:pointer;box-shadow:3px 3px 0 #1a1a1a;transition:all .12s;
  background:#FFE94E;color:#1a1a1a;text-decoration:none;flex:1;white-space:nowrap;
}
.pp-btn:active{transform:translate(3px,3px);box-shadow:none;}
.pp-btn-nav{background:#4FC3F7;}
.pp-btn-tel{background:#69D84F;}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bk);color:#fff;padding:9px 20px;border-radius:30px;font-size:.8rem;font-weight:800;z-index:9999;transition:transform .3s;white-space:nowrap;box-shadow:var(--shl);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* SPEED LINES */
.speed-lines{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;opacity:0;}
.speed-lines.show{animation:spd .5s ease forwards;}
@keyframes spd{0%{opacity:.6;}100%{opacity:0;}}
.speed-line{position:absolute;width:120%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,228,78,.8),transparent);transform-origin:left center;}

/* ══ DESKTOP TABLET ══ */
@media(max-width:860px){
  #sidebar{width:240px;min-width:160px;}
}

/* ══════════════════════════════════════
   MOBILE ≤ 600px
   Strategy: fixed header+tabs, map fixed height,
   sidebar fills the rest with scrollable list
   ══════════════════════════════════════ */
/* Hide dh1 text label on desktop (desktop uses ::after ⠿) */
@media(min-width:601px){
  .dh1-label{display:none;}
}

@media(max-width:600px){
  header{padding:7px 10px;gap:8px;overflow:hidden;}
  .h-logo{width:38px;height:38px;font-size:18px;flex-shrink:0;}
  .h-title{font-size:.9rem;}
  .h-sub{display:none;}
  .hbtn{padding:5px 9px;font-size:.72rem;}
  .tabs-bar{padding:0 8px;}
  .tab{padding:7px 10px;font-size:.78rem;flex-shrink:0;}

  main{flex-direction:column;overflow:hidden;}

  #mapWrap{
    flex:none;
    height:42vh;
    min-height:120px;
    position:relative;
    overflow:hidden;
  }

  #dh1{
    flex-shrink:0;
    width:100%;height:26px;
    border-top:3px solid var(--bk);
    border-bottom:3px solid var(--bk);
    background:var(--yw);
    display:flex;align-items:center;justify-content:center;
    cursor:row-resize;touch-action:none;user-select:none;
    overflow:hidden;
  }
  #dh1::after{ content:none; }  /* disable pseudo, using real element */
  .dh1-label{
    display:block;
    font-size:.6rem;font-weight:800;
    color:rgba(0,0,0,.45);
    white-space:nowrap;
    writing-mode:horizontal-tb;
    text-orientation:mixed;
    transform:none;
    line-height:1;
  }
  #dh1.active{background:var(--pk);}
  #dh1.active::after{color:#fff;}
  #dh2{display:none!important;}

  #sidebar{
    flex:1;
    min-height:0;
    width:100%;
    border-left:none;border-top:none;
    display:flex;flex-direction:column;
    overflow:hidden;
  }

  .sb-head{flex-shrink:0;padding:10px 12px 8px;}

  #sheetHandle{
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    height:20px;
    background:var(--yw);
    border-top:3px solid var(--bk);
    border-bottom:2px solid rgba(0,0,0,.15);
    cursor:row-resize;touch-action:none;user-select:none;
  }
  #sheetHandle:active{background:var(--pk);}
  #sheetPill{width:40px;height:4px;background:rgba(0,0,0,.28);border-radius:2px;}

  /* iOS Safari scroll fix: height:1px forces browser to compute a real height */
  .place-list{
    flex:1;
    height:1px;
    min-height:0;
    overflow-y:scroll;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior-y:contain;
    padding:6px 14px 80px 7px;  /* 80px bottom = last card fully visible */
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .place-list::-webkit-scrollbar{width:7px;display:block;}
  .place-list::-webkit-scrollbar-track{background:rgba(0,0,0,.08);border-radius:4px;}
  .place-list::-webkit-scrollbar-thumb{background:#888;border-radius:4px;min-height:44px;}

  .pcard{width:100%;flex-shrink:0;}

  #locateBtn{width:40px;height:40px;font-size:1.1em;bottom:20px;right:10px;}
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="h-logo">✈️</div>
    <div style="min-width:0;overflow:hidden;">
      <div class="h-title" id="siteTitle">土豪哥的旅行漫遊地圖</div>
      <div class="h-sub"   id="siteSub">TuHaoGe's Travel Map</div>
    </div>
    <div class="h-actions"></div>
  </header>

  <div class="tabs-bar" id="tabsBar"></div>

  <main>
    <!-- MAP -->
    <div id="mapWrap">
      <div id="map"></div>
      <button id="locateBtn" onclick="locateMe()" title="定位我的位置">📍</button>
    </div>

    <!-- DRAG HANDLE desktop: col-resize / mobile: row-resize -->
    <div class="drag-handle" id="dh1" title="拖曳調整"><span class="dh1-label">⬆ 拖曳調整 ⬇</span></div>

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <!-- Mobile sheet pill -->
      <div id="sheetHandle"><div id="sheetPill"></div></div>
      <!-- Country info + filters -->
      <div class="sb-head">
        <div class="sb-title"><span id="sflag">🗺️</span><span id="stitle">選擇國家</span></div>
        <div class="sb-desc" id="sdesc">從上方選擇國家</div>
        <div class="filter-row" id="filterRow"></div>
        <div class="city-row"   id="cityRow"></div>
      </div>
      <!-- Scrollable place list -->
      <div class="place-list" id="placeList"></div>
    </aside>
  </main>

</div>

<div class="toast" id="toast"></div>
<div class="speed-lines" id="speedLines">
  <div class="speed-line" style="top:20%;transform:rotate(-8deg)"></div>
  <div class="speed-line" style="top:45%;transform:rotate(-2deg)"></div>
  <div class="speed-line" style="top:70%;transform:rotate(5deg)"></div>
</div>

<script src="js/data.js"></script>
<script src="js/map.js"></script>
<script>
// ═══════════════════════════════════════════
// TRAVEL MAP — Main Script
// ═══════════════════════════════════════════

const TYPE = {
  sight:      {label:'景點', color:'#4FC3F7', emoji:'🏛️'},
  restaurant: {label:'餐廳', color:'#FF9A3C', emoji:'🍽️'},
  nature:     {label:'自然', color:'#69D84F', emoji:'🌿'},
  hotel:      {label:'住宿', color:'#B57BFF', emoji:'🏨'}
};

let currentCountry = null;
let activeFilters  = new Set(['sight','restaurant','nature','hotel']);
let activeCities   = new Set();

// ── Boot ──
document.addEventListener('DOMContentLoaded', async function() {
  await loadData();
  var s = TRAVEL_DATA.site || {};
  document.title = s.title || '土豪哥的旅行漫遊地圖';
  document.getElementById('siteTitle').textContent = s.title    || '土豪哥的旅行漫遊地圖';
  document.getElementById('siteSub').textContent   = s.subtitle || "TuHaoGe's Travel Map";
  initMap();
  buildTabs();
  if (TRAVEL_DATA.countries && TRAVEL_DATA.countries.length) {
    selectCountry(TRAVEL_DATA.countries[0]);
  }
  initDragResize();
});

// ── Tabs ──
function buildTabs() {
  var bar = document.getElementById('tabsBar');
  bar.innerHTML = '';
  TRAVEL_DATA.countries.forEach(function(c) {
    var b = document.createElement('button');
    b.className = 'tab';
    b.dataset.id = c.id;
    b.innerHTML = '<span>' + c.flag + '</span>' + c.name + '<span class="tab-n">' + c.places.length + '</span>';
    b.onclick = function() { selectCountry(c); };
    bar.appendChild(b);
  });
}

function selectCountry(c) {
  currentCountry = c;
  activeFilters  = new Set(['sight','restaurant','nature','hotel']);
  activeCities   = new Set();
  document.querySelectorAll('.tab').forEach(function(b) {
    b.classList.toggle('active', b.dataset.id === c.id);
  });
  triggerSpeedLines();
  flyToCountry(c.center, c.zoom);
  loadCountryMarkers(c);
  renderSidebar(c);
}

// ── Sidebar ──
function renderSidebar(c) {
  document.getElementById('sflag').textContent  = c.flag;
  document.getElementById('stitle').textContent = c.name;
  document.getElementById('sdesc').textContent  = c.desc || '';

  // Type filter chips
  var row = document.getElementById('filterRow');
  row.innerHTML = '';
  var types = [];
  c.places.forEach(function(p) { if (types.indexOf(p.type) === -1) types.push(p.type); });
  types.forEach(function(type) {
    var t = TYPE[type]; if (!t) return;
    var chip = document.createElement('button');
    chip.className = 'fchip on-' + type;
    chip.dataset.type = type;
    chip.textContent = t.emoji + ' ' + t.label;
    chip.onclick = function() {
      if (activeFilters.has(type)) {
        if (activeFilters.size === 1) return;
        activeFilters.delete(type);
        chip.classList.remove('on-' + type);
        chip.style.opacity = '.4';
      } else {
        activeFilters.add(type);
        chip.classList.add('on-' + type);
        chip.style.opacity = '1';
      }
      renderCards(c);
      showMarkersOfTypes(c, activeFilters);
    };
    row.appendChild(chip);
  });

  renderCityRow(c);
  renderCards(c);
}

function renderCityRow(c) {
  var cityRow = document.getElementById('cityRow');
  if (!cityRow) return;
  var cities = [];
  c.places.forEach(function(p) {
    if (p.city && p.city.trim() && cities.indexOf(p.city.trim()) === -1) {
      cities.push(p.city.trim());
    }
  });
  cityRow.innerHTML = '';
  if (cities.length < 2) return;

  var allChip = document.createElement('button');
  allChip.className = 'ccip on';
  allChip.textContent = '📍 全部';
  allChip.onclick = function() {
    activeCities = new Set();
    cityRow.querySelectorAll('.ccip').forEach(function(x) { x.classList.remove('on'); });
    allChip.classList.add('on');
    renderCards(c); showMarkersOfTypes(c, activeFilters);
  };
  cityRow.appendChild(allChip);

  cities.forEach(function(city) {
    var chip = document.createElement('button');
    chip.className = 'ccip';
    chip.textContent = '🏙 ' + city;
    chip.onclick = function() {
      if (activeCities.has(city)) {
        activeCities.delete(city);
        chip.classList.remove('on');
        if (activeCities.size === 0) allChip.classList.add('on');
      } else {
        activeCities.add(city);
        chip.classList.add('on');
        allChip.classList.remove('on');
      }
      renderCards(c); showMarkersOfTypes(c, activeFilters);
    };
    cityRow.appendChild(chip);
  });
}

function renderCards(c) {
  var list = document.getElementById('placeList');
  list.innerHTML = '';
  c.places.filter(function(p) {
    return activeFilters.has(p.type) &&
           (activeCities.size === 0 || activeCities.has(p.city));
  }).forEach(function(pl) {
    var t   = TYPE[pl.type] || TYPE.sight;
    var dur = '';
    if (pl.duration) {
      dur = pl.duration >= 60
        ? Math.floor(pl.duration/60) + 'h' + (pl.duration%60 ? pl.duration%60+'m' : '')
        : pl.duration + 'min';
    }
    var navUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + pl.lat + ',' + pl.lng + '&travelmode=walking';
    var telBtn = pl.phone  ? '<a class="abtn abtn-tel" href="tel:' + pl.phone + '">📞 電話</a>' : '';
    var artBtn = pl.article ? '<a class="abtn abtn-art" href="' + pl.article + '" target="_blank">📝 文章</a>' : '';

    var card = document.createElement('div');
    card.className = 'pcard ' + pl.type;
    card.id = 'card-' + pl.id;
    card.innerHTML =
      '<div class="pcard-top" onclick="toggleCard(\'' + pl.id + '\',' + pl.lat + ',' + pl.lng + ')">' +
        '<div class="pcard-ico">' + pl.icon + '</div>' +
        '<div class="pcard-info">' +
          '<div class="pcard-name">' + pl.name + '</div>' +
          '<span class="pcard-tag">' + t.emoji + ' ' + t.label + '</span>' +
          (pl.tips ? '<div class="pcard-meta">💡 ' + pl.tips + (dur ? ' · ⏱ ' + dur : '') + '</div>' : '') +
        '</div>' +
        '<span class="chev" id="chev-' + pl.id + '">▾</span>' +
      '</div>' +
      '<div class="pcard-body" id="body-' + pl.id + '">' +
        '<p class="pdesc">' + pl.desc + '</p>' +
        '<div class="pbtns">' +
          '<a class="abtn abtn-nav" href="' + navUrl + '" target="_blank">🧭 導航</a>' +
          telBtn + artBtn +
        '</div>' +
      '</div>';
    list.appendChild(card);
  });
}

function toggleCard(id, lat, lng) {
  var body = document.getElementById('body-' + id);
  var chev = document.getElementById('chev-' + id);
  var card = document.getElementById('card-' + id);
  var was  = body.classList.contains('open');
  document.querySelectorAll('.pcard-body').forEach(function(b) { b.classList.remove('open'); });
  document.querySelectorAll('.chev').forEach(function(c)       { c.classList.remove('open'); });
  document.querySelectorAll('.pcard').forEach(function(c)      { c.classList.remove('active'); });
  if (!was) {
    body.classList.add('open'); chev.classList.add('open'); card.classList.add('active');
    panToPlace(lat, lng); openMarkerPopup(id);
  }
}
function scrollToCard(id) {
  var el = document.getElementById('card-' + id);
  if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
}
function openCard(id) {
  var pl = currentCountry && currentCountry.places.find(function(p) { return p.id === id; });
  if (pl) toggleCard(id, pl.lat, pl.lng);
}
function focusCard(id) {
  var pl = currentCountry && currentCountry.places.find(function(p) { return p.id === id; });
  if (!pl) return;
  if (!activeFilters.has(pl.type)) {
    activeFilters.add(pl.type);
    var chip = document.querySelector('.fchip[data-type="' + pl.type + '"]');
    if (chip) { chip.classList.add('on-' + pl.type); chip.style.opacity = '1'; }
    renderCards(currentCountry);
    showMarkersOfTypes(currentCountry, activeFilters);
  }
  scrollToCard(id); openCard(id);
}

// ── Locate Me ──
var locateMarker = null;
function locateMe() {
  var btn = document.getElementById('locateBtn');
  if (!navigator.geolocation) { showToast('⚠️ 瀏覽器不支援定位'); return; }
  btn.textContent = '🔄'; btn.classList.remove('located');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude, lng = pos.coords.longitude;
      if (locateMarker) map.removeLayer(locateMarker);
      var locIcon = L.divIcon({
        html: '<div style="width:16px;height:16px;background:#4FC3F7;border:3px solid #1a1a1a;border-radius:50%;box-shadow:0 0 0 5px rgba(79,195,247,.3),3px 3px 0 #1a1a1a;"></div>',
        className:'', iconSize:[16,16], iconAnchor:[8,8]
      });
      locateMarker = L.marker([lat, lng], {icon:locIcon, zIndexOffset:1000}).addTo(map);
      locateMarker.bindPopup('<div style="font-family:Nunito,sans-serif;font-weight:800;padding:6px 10px;">📍 你在這裡</div>').openPopup();
      map.flyTo([lat, lng], 15, {duration:1.2});
      btn.textContent = '📍'; btn.classList.add('located');
      showToast('📍 已定位到你的位置！');
    },
    function(err) {
      btn.textContent = '📍';
      var msg = err.code===1 ? '請允許存取位置' : err.code===2 ? '無法取得位置' : '定位逾時';
      showToast('⚠️ ' + msg);
    },
    {enableHighAccuracy:true, timeout:10000}
  );
}

// ── Drag Resize ──
function initDragResize() {
  var handle = document.getElementById('dh1');
  if (!handle) return;
  var isMob = window.innerWidth <= 600;

  if (isMob) {
    // Vertical: resize map height
    var mapWrap = document.getElementById('mapWrap');
    var mainEl  = document.querySelector('main');
    var dragging = false, startY = 0, startH = 0;

    function mStart(y) {
      dragging = true; startY = y; startH = mapWrap.offsetHeight;
      handle.classList.add('active');
      document.body.style.userSelect = 'none';
    }
    function mMove(y) {
      if (!dragging) return;
      var maxH = mainEl.offsetHeight - 120;
      var newH = Math.min(Math.max(startH + (y - startY), 80), maxH);
      mapWrap.style.flex = 'none';
      mapWrap.style.height = newH + 'px';
      if (map) map.invalidateSize();
    }
    function mEnd() {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('active');
      document.body.style.userSelect = '';
      if (map) map.invalidateSize();
    }
    handle.addEventListener('mousedown',  function(e) { mStart(e.clientY); e.preventDefault(); });
    document.addEventListener('mousemove', function(e) { mMove(e.clientY); });
    document.addEventListener('mouseup',   mEnd);
    handle.addEventListener('touchstart',  function(e) { mStart(e.touches[0].clientY); }, {passive:true});
    document.addEventListener('touchmove',  function(e) { if(dragging){ mMove(e.touches[0].clientY); e.preventDefault(); } }, {passive:false});
    document.addEventListener('touchend',   mEnd);

    // Sheet handle also resizes map
    var sh = document.getElementById('sheetHandle');
    if (sh) {
      sh.addEventListener('touchstart',  function(e) { mStart(e.touches[0].clientY); }, {passive:true});
      document.addEventListener('touchmove',  function(e) { /* already handled */ }, {passive:false});
      sh.addEventListener('mousedown', function(e) { mStart(e.clientY); e.preventDefault(); });
    }

  } else {
    // Horizontal: resize sidebar width
    var sidebar  = document.getElementById('sidebar');
    var dragging = false, startX = 0, startW = 0;
    handle.addEventListener('mousedown', function(e) {
      dragging = true; startX = e.clientX; startW = sidebar.offsetWidth;
      handle.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      var newW = Math.min(Math.max(startW + (startX - e.clientX), 180), window.innerWidth * 0.52);
      sidebar.style.width = newW + 'px';
      if (map) map.invalidateSize();
    });
    document.addEventListener('mouseup', function() {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      if (map) map.invalidateSize();
    });
  }
}

// ── Speed Lines ──
function triggerSpeedLines() {
  var el = document.getElementById('speedLines');
  el.classList.remove('show'); void el.offsetWidth;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 600);
}

// ── Toast ──
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(function() { t.classList.remove('show'); }, 2600);
}
</script>
